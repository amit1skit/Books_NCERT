<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav-w:260px;
  --bg:#141414;--surface:#1e1e1e;--surface2:#272727;--surface3:#303030;
  --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.15);--border-hi:rgba(255,255,255,0.24);
  --text:#f0ede8;--text2:#9e9b94;--text3:#56544f;
  --alkali-bg:#7a4a10;--alkali-tx:#f5c97a;--alkali-br:#c07820;
  --alkaline-bg:#5a3a08;--alkaline-tx:#e8b060;--alkaline-br:#a06418;
  --transition-bg:#1a3a5a;--transition-tx:#7ab8e8;--transition-br:#2a5a8a;
  --post-bg:#1a3a20;--post-tx:#78c888;--post-br:#2a6030;
  --metalloid-bg:#3a2a60;--metalloid-tx:#a898e8;--metalloid-br:#5a409a;
  --nonmetal-bg:#1a4a40;--nonmetal-tx:#70d4b8;--nonmetal-br:#1a7060;
  --halogen-bg:#4a1a3a;--halogen-tx:#d888b8;--halogen-br:#7a2860;
  --noble-bg:#2e2e32;--noble-tx:#a8a8bc;--noble-br:#505068;
  --lanthanide-bg:#1a2a4a;--lanthanide-tx:#80a8d8;--lanthanide-br:#2a4070;
  --actinide-bg:#2a1a4a;--actinide-tx:#a888d0;--actinide-br:#4a2a78;
}
html,body{height:100%;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);overflow:hidden}
.layout{display:flex;height:100vh}

/* NAV */
nav{width:var(--nav-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
nav::-webkit-scrollbar{width:3px}nav::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
.nav-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.nav-head h1{font-family:'Fraunces',serif;font-size:15px;font-weight:600;letter-spacing:-0.3px;line-height:1.3}
.nav-head p{font-size:10px;color:var(--text3);margin-top:3px}
.nav-sec{border-bottom:1px solid var(--border)}
.nav-btn{width:100%;padding:9px 14px;display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text2);text-align:left;transition:background 0.12s}
.nav-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-btn.active{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.nav-cnt{margin-left:auto;font-size:10px;color:var(--text3);background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:10px}
.nav-arr{font-size:11px;color:var(--text3);transition:transform 0.2s;display:inline-block}
.nav-btn.open .nav-arr{transform:rotate(90deg)}
.nav-els{overflow:hidden;max-height:0;transition:max-height 0.3s ease}
.nav-els.open{max-height:800px}
.nav-gdesc{padding:6px 14px 8px 34px;font-size:10px;color:var(--text3);line-height:1.6;border-bottom:1px solid var(--border)}
.nav-chips{padding:6px 8px 10px 34px;display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10px;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid transparent;font-family:'DM Mono',monospace;font-weight:500;transition:transform 0.1s,box-shadow 0.12s}
.chip:hover{transform:scale(1.13);box-shadow:0 2px 12px rgba(0,0,0,0.5)}
.nav-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--text3);line-height:1.8;position:sticky;bottom:0;background:var(--surface)}

/* MAIN */
main{flex:1;overflow:auto;padding:20px 18px 40px;display:flex;flex-direction:column;gap:14px}
main::-webkit-scrollbar{width:5px;height:5px}
main::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.main-title h2{font-family:'Fraunces',serif;font-size:22px;font-weight:300;letter-spacing:-0.5px}
.main-title p{font-size:10px;color:var(--text3);margin-top:3px}
.legend{display:flex;flex-wrap:wrap;gap:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);cursor:pointer;user-select:none}
.leg:hover{color:var(--text)}.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.fbar{display:flex;flex-wrap:wrap;gap:6px}
.fbtn{padding:5px 12px;border-radius:16px;font-size:10px;cursor:pointer;border:1px solid transparent;font-family:'DM Mono',monospace;font-weight:500;transition:all 0.12s;color:var(--text2);background:var(--surface2)}
.fbtn:hover{color:var(--text);border-color:var(--border-md)}
.fbtn.all.active{background:var(--text);color:var(--bg)}
.ipanel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:none;animation:fi 0.18s ease}
.ipanel.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.ipanel h3{font-family:'Fraunces',serif;font-size:15px;font-weight:300;margin-bottom:5px}
.ipanel p{font-size:11px;color:var(--text2);line-height:1.7}
.istats{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.istat{border-radius:7px;padding:7px 14px}
.istat .sv{font-size:18px;font-weight:500}.istat .sl{font-size:9px;margin-top:1px;opacity:0.6;letter-spacing:0.4px;text-transform:uppercase}

/* GRID */
.pt-scroll{overflow-x:auto}.pt-scroll::-webkit-scrollbar{height:3px}.pt-scroll::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
.ghdr{display:grid;grid-template-columns:repeat(18,minmax(36px,1fr));gap:2px;min-width:680px;margin-bottom:3px}
.gh{font-size:9px;color:var(--text3);text-align:center}
.pgrid{display:grid;grid-template-columns:repeat(18,minmax(36px,1fr));gap:2px;min-width:680px}
.el{border-radius:5px;padding:2px;cursor:pointer;text-align:center;min-height:52px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:1px solid transparent;transition:transform 0.1s,opacity 0.18s;position:relative}
.el:hover{transform:scale(1.2);z-index:50}
.el.dim{opacity:0.1}.el.hl{outline:2px solid var(--text);outline-offset:1px;z-index:5}
.el .n{font-size:8px;opacity:0.65;line-height:1.2}.el .s{font-size:14px;font-weight:500;line-height:1.3}
.el .nm{font-size:7px;opacity:0.6;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:100%}
.gcell{background:transparent;border:none;pointer-events:none;min-height:52px}
.ph{background:rgba(255,255,255,0.04);border:1px dashed var(--border-md);border-radius:5px;min-height:52px;display:flex;align-items:center;justify-content:center}
.ph span{font-size:9px;color:var(--text3)}.sep{grid-column:1/-1;height:10px}
.rlbl{grid-column:1/-1;font-size:9px;color:var(--text3);padding:3px 2px 1px;letter-spacing:0.5px}

/* HOVER TOOLTIP */
#tip{position:fixed;background:#1a1a1e;border:1px solid rgba(255,255,255,0.18);border-radius:12px;padding:14px 18px;font-size:12px;z-index:9999;pointer-events:none;display:none;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,0.7)}
.t-sym{font-size:34px;font-weight:500;line-height:1;font-family:'Fraunces',serif}
.t-name{font-size:15px;font-weight:500;margin:4px 0 3px}
.t-badge{display:inline-block;font-size:10px;padding:2px 9px;border-radius:12px;margin-bottom:8px;font-weight:500}
.t-row{font-size:11px;color:var(--text2);margin:2px 0}.t-row b{color:var(--text)}
.t-div{border-top:1px solid rgba(255,255,255,0.08);margin:7px 0}
.t-hint{font-size:10px;color:var(--text3)}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#1a1a1e;border:1px solid var(--border-hi);border-radius:18px;width:720px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;transform:translateY(20px) scale(0.97);transition:transform 0.22s;box-shadow:0 28px 90px rgba(0,0,0,0.85)}
.overlay.open .modal{transform:none}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}

/* Modal header */
.m-head{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:18px;flex-shrink:0}
.m-symbox{width:76px;height:76px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:1px solid transparent}
.m-sym{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1}
.m-znum{font-size:11px;opacity:0.7;margin-top:2px}
.m-info{flex:1;min-width:0}
.m-name{font-family:'Fraunces',serif;font-size:24px;font-weight:300;letter-spacing:-0.4px;line-height:1.2}
.m-tagline{font-size:10px;color:var(--text3);margin:4px 0 8px;line-height:1.5}
.m-badges{display:flex;flex-wrap:wrap;gap:5px}
.mbadge{font-size:10px;padding:3px 10px;border-radius:10px;border:1px solid transparent;font-weight:500}
.m-close{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:14px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s}
.m-close:hover{background:rgba(255,255,255,0.08);color:var(--text)}

/* TABS */
.m-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 26px;flex-shrink:0;background:#1a1a1e}
.mtab{padding:10px 16px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;user-select:none;background:none;border-top:none;border-left:none;border-right:none}
.mtab:hover{color:var(--text2)}
.mtab.active{color:var(--text);border-bottom-color:currentColor}

/* Tab panels */
.m-panels{overflow-y:auto;flex:1}
.m-panels::-webkit-scrollbar{width:4px}.m-panels::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.tpanel{display:none;padding:22px 26px 28px;flex-direction:column;gap:20px}
.tpanel.active{display:flex}

/* Section */
.msec{display:flex;flex-direction:column;gap:10px}
.msec-title{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Stat grid */
.mstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.mstat{background:var(--surface2);border-radius:8px;padding:10px 13px;border:1px solid var(--border)}
.mstat .mk{font-size:9px;color:var(--text3);letter-spacing:0.3px;margin-bottom:4px;text-transform:uppercase}
.mstat .mv{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.mstat .mu{font-size:9px;color:var(--text2)}

/* Prop rows */
.mprops{display:flex;flex-direction:column}
.mprop{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.mprop:last-child{border-bottom:none}
.mprop .pk{font-size:11px;color:var(--text2);min-width:170px;flex-shrink:0}
.mprop .pv{font-size:11px;color:var(--text);font-weight:500;line-height:1.5}

/* Electron shells */
.e-config{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:4px 0}
.e-shell{display:flex;flex-direction:column;align-items:center;gap:3px}
.e-ring{width:30px;height:30px;border-radius:50%;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.e-lbl{font-size:8px;color:var(--text3)}
.e-arrow{font-size:10px;color:var(--text3)}

/* Uses */
.m-uses{display:flex;flex-wrap:wrap;gap:6px}
.use-tag{font-size:10px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2)}

/* Fun fact */
.m-fact{border-radius:10px;padding:14px 16px;border-left:3px solid;font-size:11px;color:var(--text2);line-height:1.8;background:var(--surface2)}
.m-fact b{color:var(--text)}

/* Discovery */
.m-disc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.dcard{background:var(--surface2);border-radius:8px;padding:10px 14px;border:1px solid var(--border)}
.dcard .dk{font-size:9px;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:4px}
.dcard .dv{font-size:12px;color:var(--text);font-weight:500;line-height:1.4}

/* Reactivity bar */
.rbar-wrap{display:flex;flex-direction:column;gap:6px}
.rbar-row{display:flex;align-items:center;gap:10px}
.rbar-lbl{font-size:10px;color:var(--text2);min-width:140px}
.rbar-track{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.rbar-val{font-size:10px;color:var(--text2);min-width:36px;text-align:right}

/* Isotopes */
.isotope-grid{display:flex;flex-wrap:wrap;gap:6px}
.iso{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text2);line-height:1.5}
.iso .isym{font-size:12px;font-weight:500;color:var(--text)}

/* ═══════════════════════════════════════
   QUIZ TAB
═══════════════════════════════════════ */
.quiz-wrap{display:flex;flex-direction:column;gap:16px}

/* Score header */
.quiz-score-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:10px;padding:10px 16px;border:1px solid var(--border)}
.qs-label{font-size:11px;color:var(--text2)}
.qs-score{font-size:16px;font-weight:500;color:var(--text)}
.qs-prog{display:flex;gap:4px;align-items:center}
.qs-dot{width:8px;height:8px;border-radius:50%;background:var(--border-md)}
.qs-dot.done-ok{background:#4CAF50}.qs-dot.done-fail{background:#e25555}

/* Question card */
.q-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px}
.q-num{font-size:9px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:14px;color:var(--text);line-height:1.6;font-family:'Fraunces',serif;font-weight:300;margin-bottom:16px}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--border-md);cursor:pointer;background:var(--surface3);transition:all 0.13s;font-size:12px;color:var(--text2);text-align:left;font-family:'DM Mono',monospace;width:100%}
.q-opt:hover:not(:disabled){background:rgba(255,255,255,0.06);border-color:var(--border-hi);color:var(--text)}
.q-opt:disabled{cursor:default}
.q-opt.correct{background:rgba(76,175,80,0.15);border-color:#4CAF50;color:#7dd87f}
.q-opt.wrong{background:rgba(226,85,85,0.15);border-color:#e25555;color:#e88888}
.q-opt.reveal{background:rgba(76,175,80,0.08);border-color:#4CAF5066;color:#7dd87f}
.q-opt-letter{width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.q-opt.correct .q-opt-letter{background:#4CAF50;color:#fff}
.q-opt.wrong .q-opt-letter{background:#e25555;color:#fff}

/* Feedback */
.q-feedback{padding:12px 14px;border-radius:8px;font-size:11px;line-height:1.7;display:none;margin-top:4px}
.q-feedback.show{display:block}
.q-feedback.ok{background:rgba(76,175,80,0.12);border:1px solid #4CAF5040;color:#9de0a0}
.q-feedback.fail{background:rgba(226,85,85,0.12);border:1px solid #e2555540;color:#e89090}

/* Quiz nav */
.q-nav{display:flex;align-items:center;gap:8px;justify-content:space-between}
.qbtn{background:none;border:1px solid var(--border-md);border-radius:8px;color:var(--text2);cursor:pointer;font-size:11px;padding:7px 16px;font-family:'DM Mono',monospace;font-weight:500;transition:all 0.12s}
.qbtn:hover:not(:disabled){background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border-hi)}
.qbtn:disabled{opacity:0.3;cursor:default}
.qbtn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.qbtn.primary:hover{opacity:0.9}

/* Final result */
.quiz-result{display:none;flex-direction:column;align-items:center;gap:14px;padding:20px 10px;text-align:center}
.quiz-result.show{display:flex}
.result-score{font-family:'Fraunces',serif;font-size:52px;font-weight:300;line-height:1}
.result-label{font-size:13px;color:var(--text2);line-height:1.6}
.result-grade{font-size:11px;padding:4px 14px;border-radius:12px;font-weight:500;margin-top:2px}
.result-breakdown{display:flex;gap:20px;margin-top:4px}
.rb-item{font-size:11px;color:var(--text2)}.rb-item b{color:var(--text)}

/* Modal footer nav */
.m-foot{padding:14px 26px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mfbtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:11px;padding:6px 14px;font-family:'DM Mono',monospace;transition:all 0.12s}
.mfbtn:hover:not(:disabled){background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border-md)}
.mfbtn:disabled{opacity:0.28;cursor:default}
.m-foot-center{font-size:10px;color:var(--text3)}

/* ═══════════════════════════════════════
   GROUP MODAL
═══════════════════════════════════════ */
.g-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:3000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s}
.g-overlay.open{opacity:1;pointer-events:all}
.g-modal{background:#1a1a1e;border:1px solid var(--border-hi);border-radius:18px;width:740px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;transform:translateY(20px) scale(0.97);transition:transform 0.22s;box-shadow:0 28px 90px rgba(0,0,0,0.85)}
.g-overlay.open .g-modal{transform:none}
.g-modal::-webkit-scrollbar{width:4px}.g-modal::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}

/* group modal header */
.gm-head{padding:24px 28px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px;flex-shrink:0}
.gm-icon{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid transparent;font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.gm-info{flex:1;min-width:0}
.gm-title{font-family:'Fraunces',serif;font-size:26px;font-weight:300;letter-spacing:-0.4px}
.gm-sub{font-size:10px;color:var(--text3);margin:4px 0 8px;line-height:1.5}
.gm-badges{display:flex;flex-wrap:wrap;gap:5px}
.gm-badge{font-size:10px;padding:3px 10px;border-radius:10px;border:1px solid transparent;font-weight:500}
.gm-close{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:14px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s}
.gm-close:hover{background:rgba(255,255,255,0.08);color:var(--text)}

/* group modal tabs */
.gm-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 28px;flex-shrink:0;background:#1a1a1e}
.gmtab{padding:10px 16px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;user-select:none;background:none;border-top:none;border-left:none;border-right:none}
.gmtab:hover{color:var(--text2)}.gmtab.active{color:var(--text);border-bottom-color:currentColor}

/* group modal panels */
.gm-panels{overflow-y:auto;flex:1}
.gm-panels::-webkit-scrollbar{width:4px}.gm-panels::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.gtpanel{display:none;padding:22px 28px 28px;flex-direction:column;gap:20px}
.gtpanel.active{display:flex}

/* group elements grid */
.gel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px}
.gel-card{border-radius:8px;padding:8px 6px;border:1px solid transparent;cursor:pointer;text-align:center;transition:transform 0.1s,box-shadow 0.1s;display:flex;flex-direction:column;gap:2px}
.gel-card:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.gel-z{font-size:8px;opacity:0.65}
.gel-sym{font-size:16px;font-weight:500}
.gel-name{font-size:7px;opacity:0.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* trend bars */
.trend-wrap{display:flex;flex-direction:column;gap:8px}
.trend-row{display:flex;align-items:center;gap:10px}
.trend-lbl{font-size:10px;color:var(--text2);min-width:160px;flex-shrink:0}
.trend-bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative}
.trend-fill{height:100%;border-radius:4px}
.trend-val{font-size:10px;color:var(--text2);min-width:50px;text-align:right}

/* key facts list */
.kf-list{display:flex;flex-direction:column;gap:0}
.kf-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.kf-item:last-child{border-bottom:none}
.kf-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.kf-text{font-size:11px;color:var(--text2);line-height:1.7}
.kf-text b{color:var(--text)}

/* comparison table */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cmp-tbl th{font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.cmp-tbl td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.cmp-tbl tr:last-child td{border-bottom:none}
.cmp-tbl tr:hover td{background:rgba(255,255,255,0.03)}
.cmp-sym{font-size:13px;font-weight:500;margin-right:4px}

/* nav button — split layout */
.nav-btn-row{width:100%;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.nav-btn-label{flex:1;padding:9px 14px;display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text2);text-align:left;transition:background 0.12s;min-width:0}
.nav-btn-label:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-btn-label.active{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-btn-toggle{padding:9px 12px;background:none;border:none;border-left:1px solid var(--border);cursor:pointer;color:var(--text3);transition:background 0.12s,transform 0.2s;flex-shrink:0;font-size:13px}
.nav-btn-toggle:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-btn-toggle.open{transform:rotate(90deg)}
.nav-open-btn{font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid transparent;font-family:'DM Mono',monospace;font-weight:500;cursor:pointer;transition:opacity 0.12s;margin-left:2px;flex-shrink:0}
.nav-open-btn:hover{opacity:0.8}
</style>

const pgrid=document.getElementById('pgrid');
function mkEl(el){
  if(!el){const g=document.createElement('div');g.className='gcell';return g;}
  const g=GRP[el[4]];
  const d=document.createElement('div'); d.className='el';
  d.style.cssText=`background:${g.bg};color:${g.tx};border-color:${g.br}60`;
  d.innerHTML=`<span class="n">${el[0]}</span><span class="s">${el[1]}</span><span class="nm">${el[2].length>11?el[2].slice(0,10)+'…':el[2]}</span>`;
  d.setAttribute('data-k',el[4]); d.setAttribute('data-z',el[0]);
  d.addEventListener('mouseenter',showTip); d.addEventListener('mouseleave',hideTip);
  d.addEventListener('click',()=>{hideTip();openModal(el[0],'details');});
  return d;
}
function buildGrid(){
  pgrid.innerHTML='';
  for(let r=1;r<=7;r++){
    for(let c=1;c<=18;c++){
      const el=ELS.find(e=>e[5]===r&&e[6]===c);
      if(r===6&&c===3&&!el){const ph=document.createElement('div');ph.className='ph';ph.innerHTML='<span>57–71</span>';pgrid.appendChild(ph);}
      else if(r===7&&c===3&&!el){const ph=document.createElement('div');ph.className='ph';ph.innerHTML='<span>89–103</span>';pgrid.appendChild(ph);}
      else{pgrid.appendChild(mkEl(el||null));}
    }
  }
  const sep=document.createElement('div');sep.className='sep';pgrid.appendChild(sep);
  const ll=document.createElement('div');ll.className='rlbl';ll.textContent='Lanthanides — Period 6 · f-block (Ce–Lu)';pgrid.appendChild(ll);
  for(let c=1;c<=18;c++){
    if(c<=3){const d=document.createElement('div');d.className='gcell';pgrid.appendChild(d);}
    else if(c>=4&&c<=17){pgrid.appendChild(mkEl(ELS.find(e=>e[5]===9&&e[6]===c)||null));}
    else{const d=document.createElement('div');d.className='gcell';pgrid.appendChild(d);}
  }
  const al=document.createElement('div');al.className='rlbl';al.textContent='Actinides — Period 7 · f-block (Th–Lr)';pgrid.appendChild(al);
  for(let c=1;c<=18;c++){
    if(c<=3){const d=document.createElement('div');d.className='gcell';pgrid.appendChild(d);}
    else if(c>=4&&c<=17){pgrid.appendChild(mkEl(ELS.find(e=>e[5]===10&&e[6]===c)||null));}
    else{const d=document.createElement('div');d.className='gcell';pgrid.appendChild(d);}
  }
  applyF();
}

function setFilter(f){
  activeF=f; hlZ=null;
  document.querySelectorAll('.fbtn').forEach(b=>{const k=b.getAttribute('data-k');b.classList.toggle('active',f==='all'?b.classList.contains('all'):k===f);});
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const k=b.getAttribute('data-k'),isT=k===f;
    b.classList.toggle('active',isT);
    if(!isT){b.classList.remove('open');b.nextElementSibling.classList.remove('open');}
    else{b.classList.add('open');b.nextElementSibling.classList.add('open');}
  });
  const panel=document.getElementById('ipanel');
  if(f!=='all'){
    const g=GRP[f]; const cnt=ELS.filter(e=>e[4]===f).length;
    panel.className='ipanel on'; panel.style.borderLeft=`3px solid ${g.br}`;
    panel.innerHTML=`<h3 style="color:${g.tx}">${g.label}</h3><p>${g.desc}</p>
      <div class="istats">
        <div class="istat" style="background:${g.bg}"><div class="sv" style="color:${g.tx}">${cnt}</div><div class="sl" style="color:${g.tx}">elements</div></div>
        <div class="istat" style="background:${g.bg}"><div class="sv" style="color:${g.tx};font-size:11px">${g.bond}</div><div class="sl" style="color:${g.tx}">bonding type</div></div>
      </div>`;
  } else{panel.className='ipanel';}
  applyF();
}

function applyF(){
  document.querySelectorAll('.el[data-k]').forEach(cell=>{
    const k=cell.getAttribute('data-k'),z=+cell.getAttribute('data-z');
    cell.classList.remove('dim','hl');
    if(hlZ!==null){if(z===hlZ)cell.classList.add('hl');else cell.classList.add('dim');}
    else if(activeF!=='all'&&k!==activeF){cell.classList.add('dim');}
  });
}

function openModal(z, startTab){
  const el=ELS.find(e=>e[0]===z); if(!el)return;
  const g=GRP[el[4]]; const ex=getED(z);
  const period=el[5]<=7?el[5]:(el[5]===9?6:7);
  const block=el[6]<=2?'s':(el[5]===9||el[5]===10?'f':(el[6]<=12?'d':'p'));
  const sorted=ELS.slice().sort((a,b)=>a[0]-b[0]);
  const idx=sorted.findIndex(e=>e[0]===z);
  const prevZ=idx>0?sorted[idx-1][0]:null;
  const nextZ=idx<sorted.length-1?sorted[idx+1][0]:null;

  hlZ=z; applyF();

  /* Header */
  document.getElementById('m-head').innerHTML=`
    <div class="m-symbox" style="background:${g.bg};border-color:${g.br};color:${g.tx}">
      <div class="m-sym">${el[1]}</div>
      <div class="m-znum">Z = ${el[0]}</div>
    </div>
    <div class="m-info">
      <div class="m-name">${el[2]}</div>
      <div class="m-tagline">${ex.cat} · ${ex.phase} at STP · ${block.toUpperCase()}-block · Period ${period}</div>
      <div class="m-badges">
        <span class="mbadge" style="background:${g.bg};color:${g.tx};border-color:${g.br}">${g.label}</span>
        <span class="mbadge" style="background:rgba(255,255,255,0.06);color:var(--text2);border-color:var(--border)">Group ${el[6]}</span>
        <span class="mbadge" style="background:rgba(255,255,255,0.06);color:var(--text2);border-color:var(--border)">${g.bond}</span>
        <span class="mbadge" style="background:rgba(255,255,255,0.06);color:var(--text2);border-color:var(--border)">Mass: ${el[3]}</span>
      </div>
    </div>
    <button class="m-close" id="mclosebtn">✕</button>
  `;
  document.getElementById('mclosebtn').onclick=closeModal;

  /* Tabs */
  const TABS=[
    {id:'details',label:'Details'},
    {id:'properties',label:'Properties'},
    {id:'chemistry',label:'Chemistry'},
    {id:'history',label:'History & Uses'},
    {id:'quiz',label:'Quiz ✦'},
  ];
  const tabsEl=document.getElementById('m-tabs');
  tabsEl.innerHTML='';
  TABS.forEach(t=>{
    const b=document.createElement('button'); b.className='mtab'; b.setAttribute('data-tab',t.id);
    b.textContent=t.label;
    b.onclick=()=>switchTab(t.id);
    tabsEl.appendChild(b);
  });

  /* Build all panels */
  const panelsEl=document.getElementById('m-panels');
  panelsEl.innerHTML='';

  /* DETAILS panel */
  const shellLabels=['K','L','M','N','O','P','Q'];
  let shellHTML='<div class="e-config">';
  (ex.shells||[]).forEach((cnt,i)=>{
    shellHTML+=`<div class="e-shell"><div class="e-ring" style="border-color:${g.br};color:${g.tx};background:${g.bg}">${cnt}</div><div class="e-lbl">${shellLabels[i]||'?'}</div></div>`;
    if(i<ex.shells.length-1) shellHTML+=`<div class="e-arrow">›</div>`;
  });
  shellHTML+='</div>';

  const detPanel=document.createElement('div'); detPanel.className='tpanel'; detPanel.id='tab-details';
  detPanel.innerHTML=`
    <div class="msec">
      <div class="msec-title">Atomic identity</div>
      <div class="mstats">
        <div class="mstat"><div class="mk">Atomic number</div><div class="mv">${el[0]}</div></div>
        <div class="mstat"><div class="mk">Atomic mass</div><div class="mv">${el[3]} <span class="mu">u</span></div></div>
        <div class="mstat"><div class="mk">Symbol</div><div class="mv">${el[1]}</div></div>
        <div class="mstat"><div class="mk">Period</div><div class="mv">${period}</div></div>
        <div class="mstat"><div class="mk">Group col.</div><div class="mv">${el[6]}</div></div>
        <div class="mstat"><div class="mk">Block</div><div class="mv">${block.toUpperCase()}-block</div></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Electron shell configuration</div>
      ${shellHTML}
    </div>
    <div class="msec">
      <div class="msec-title">Classification</div>
      <div class="mprops">
        <div class="mprop"><span class="pk">Element group</span><span class="pv">${g.label}</span></div>
        <div class="mprop"><span class="pk">Category</span><span class="pv">${ex.cat}</span></div>
        <div class="mprop"><span class="pk">Phase at STP</span><span class="pv">${ex.phase}</span></div>
        <div class="mprop"><span class="pk">Bonding type</span><span class="pv">${g.bond}</span></div>
        <div class="mprop"><span class="pk">Crystal structure</span><span class="pv">${ex.crystal}</span></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Did you know?</div>
      <div class="m-fact" style="border-color:${g.br}">${ex.fact}</div>
    </div>
  `;
  panelsEl.appendChild(detPanel);

  /* PROPERTIES panel */
  const rk=ex.reactivity||{};
  function rBar(lbl,val,max=10){
    const pct=Math.min(100,Math.round((val/max)*100));
    return `<div class="rbar-row"><span class="rbar-lbl">${lbl}</span><div class="rbar-track"><div class="rbar-fill" style="width:${pct}%;background:${g.br}"></div></div><span class="rbar-val">${val}/10</span></div>`;
  }
  const isoHTML=(ex.isotopes||[]).map(iso=>`<div class="iso"><div class="isym">${iso.sym}</div>${iso.name} ${iso.stable?'<span style="color:#7dd87f;font-size:9px">stable</span>':'<span style="color:#e88888;font-size:9px">radioactive</span>'}</div>`).join('');

  const propPanel=document.createElement('div'); propPanel.className='tpanel'; propPanel.id='tab-properties';
  propPanel.innerHTML=`
    <div class="msec">
      <div class="msec-title">Physical properties</div>
      <div class="mstats">
        <div class="mstat"><div class="mk">Melting point</div><div class="mv">${ex.mp!=='—'?Number(ex.mp).toFixed(1):ex.mp} <span class="mu">K</span></div></div>
        <div class="mstat"><div class="mk">Boiling point</div><div class="mv">${ex.bp!=='—'?Number(ex.bp).toFixed(1):ex.bp} <span class="mu">K</span></div></div>
        <div class="mstat"><div class="mk">Density (STP)</div><div class="mv">${ex.dens} <span class="mu">g/cm³</span></div></div>
        <div class="mstat"><div class="mk">Crust abundance</div><div class="mv">${ex.abund} <span class="mu">ppm</span></div></div>
        <div class="mstat"><div class="mk">Melting point °C</div><div class="mv">${ex.mp!=='—'?(Number(ex.mp)-273.15).toFixed(1):ex.mp} <span class="mu">°C</span></div></div>
        <div class="mstat"><div class="mk">Boiling point °C</div><div class="mv">${ex.bp!=='—'?(Number(ex.bp)-273.15).toFixed(1):ex.bp} <span class="mu">°C</span></div></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Reactivity indicators</div>
      <div class="rbar-wrap">
        ${rBar('Reactivity with water',rk.water||3)}
        ${rBar('Reactivity with acids',rk.acid||3)}
        ${rBar('Reactivity with oxygen',rk.oxygen||3)}
        ${rBar('Reactivity with metals',rk.metals||3)}
      </div>
    </div>
    ${isoHTML?`<div class="msec"><div class="msec-title">Key isotopes</div><div class="isotope-grid">${isoHTML}</div></div>`:''}
  `;
  panelsEl.appendChild(propPanel);

  /* CHEMISTRY panel */
  const chemPanel=document.createElement('div'); chemPanel.className='tpanel'; chemPanel.id='tab-chemistry';
  chemPanel.innerHTML=`
    <div class="msec">
      <div class="msec-title">Chemical properties</div>
      <div class="mprops">
        <div class="mprop"><span class="pk">Electronegativity (Pauling)</span><span class="pv">${ex.en}</span></div>
        <div class="mprop"><span class="pk">Valence electrons</span><span class="pv">${ex.valence}</span></div>
        <div class="mprop"><span class="pk">Oxidation states</span><span class="pv">${ex.ox}</span></div>
        <div class="mprop"><span class="pk">Bonding type</span><span class="pv">${g.bond}</span></div>
        <div class="mprop"><span class="pk">Crystal structure</span><span class="pv">${ex.crystal}</span></div>
        <div class="mprop"><span class="pk">Phase at STP</span><span class="pv">${ex.phase}</span></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Group chemistry</div>
      <div class="m-fact" style="border-color:${g.br};font-size:11px;line-height:1.8">${g.desc}</div>
    </div>
    <div class="msec">
      <div class="msec-title">Electron configuration (shells)</div>
      ${shellHTML}
      <div class="mprops" style="margin-top:10px">
        <div class="mprop"><span class="pk">Block</span><span class="pv">${block.toUpperCase()}-block</span></div>
        <div class="mprop"><span class="pk">Valence shell electrons</span><span class="pv">${Array.isArray(ex.shells)&&ex.shells.length?ex.shells[ex.shells.length-1]:'—'}</span></div>
        <div class="mprop"><span class="pk">Total electron shells</span><span class="pv">${Array.isArray(ex.shells)?ex.shells.length:'—'}</span></div>
      </div>
    </div>
  `;
  panelsEl.appendChild(chemPanel);

  /* HISTORY & USES panel */
  const histPanel=document.createElement('div'); histPanel.className='tpanel'; histPanel.id='tab-history';
  histPanel.innerHTML=`
    <div class="msec">
      <div class="msec-title">Discovery</div>
      <div class="m-disc">
        <div class="dcard"><div class="dk">Year</div><div class="dv">${ex.yr}</div></div>
        <div class="dcard"><div class="dk">Discovered by</div><div class="dv">${ex.who}</div></div>
        <div class="dcard"><div class="dk">Country</div><div class="dv">${ex.where}</div></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Name origin</div>
      <div class="mprops">
        <div class="mprop"><span class="pk">Element name</span><span class="pv">${el[2]}</span></div>
        <div class="mprop"><span class="pk">Symbol</span><span class="pv">${el[1]}</span></div>
        <div class="mprop"><span class="pk">Atomic number</span><span class="pv">${el[0]}</span></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Key uses &amp; applications</div>
      <div class="m-uses">${(ex.uses||[]).map(u=>`<span class="use-tag">${u}</span>`).join('')}</div>
    </div>
    <div class="msec">
      <div class="msec-title">Fun fact</div>
      <div class="m-fact" style="border-color:${g.br}">${ex.fact}</div>
    </div>
  `;
  panelsEl.appendChild(histPanel);

  /* QUIZ panel */
  const quizPanel=document.createElement('div'); quizPanel.className='tpanel'; quizPanel.id='tab-quiz';
  panelsEl.appendChild(quizPanel);
  initQuiz(z, g, quizPanel);

  /* Footer */
  document.getElementById('m-foot').innerHTML=`
    <button class="mfbtn" id="m-prev" ${!prevZ?'disabled':''}>← ${prevZ?ELS.find(e=>e[0]===prevZ)[1]:''}</button>
    <span class="m-foot-center">${el[0]} / 118 elements</span>
    <button class="mfbtn" id="m-next" ${!nextZ?'disabled':''}>→ ${nextZ?ELS.find(e=>e[0]===nextZ)[1]:''}</button>
  `;
  if(prevZ) document.getElementById('m-prev').onclick=()=>openModal(prevZ,'details');
  if(nextZ) document.getElementById('m-next').onclick=()=>openModal(nextZ,'details');

  document.getElementById('overlay').classList.add('open');
  panelsEl.scrollTop=0;
  switchTab(startTab||'details');
}

function switchTab(id){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.toggle('active',t.getAttribute('data-tab')===id));
  document.querySelectorAll('.tpanel').forEach(p=>p.classList.toggle('active',p.id===`tab-${id}`));
}

/* ═══════════════════════════════════════════
   QUIZ ENGINE
═══════════════════════════════════════════ */
function initQuiz(z, g, container){
  const ex=getED(z);
  const qs=ex.quiz||[];
  const state={qIdx:0,score:0,answered:new Array(qs.length).fill(null),total:qs.length};
  renderQuiz(z,g,qs,state,container);
}

function renderQuiz(z,g,qs,state,container){
  container.innerHTML='';
  if(!qs.length){
    container.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text2);font-size:12px">No quiz questions available for this element yet.</div>`;
    return;
  }

  /* If showing final result */
  if(state.qIdx>=state.total && state.answered.every(a=>a!==null)){
    const pct=Math.round((state.score/state.total)*100);
    const grade=pct>=80?{label:'Excellent!',bg:'rgba(76,175,80,0.15)',col:'#7dd87f'}:pct>=60?{label:'Good work',bg:'rgba(255,193,7,0.12)',col:'#ffd54f'}:{label:'Keep learning!',bg:'rgba(226,85,85,0.12)',col:'#e88888'};
    container.innerHTML=`
      <div class="quiz-result show">
        <div class="result-score" style="color:${g.tx}">${state.score}<span style="font-size:24px;color:var(--text2)">/${state.total}</span></div>
        <div class="result-label">Quiz complete for <b>${ELS.find(e=>e[0]===z)[2]}</b></div>
        <div class="result-grade" style="background:${grade.bg};color:${grade.col}">${grade.label} — ${pct}%</div>
        <div class="result-breakdown">
          <div class="rb-item"><b style="color:#7dd87f">${state.score}</b> correct</div>
          <div class="rb-item"><b style="color:#e88888">${state.total-state.score}</b> wrong</div>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="qbtn primary" onclick="(function(){const ex=getED(${z});const qs=ex.quiz||[];const st={qIdx:0,score:0,answered:new Array(qs.length).fill(null),total:qs.length};renderQuiz(${z},GRP['${ELS.find(e=>e[0]===z)[4]}'],qs,st,document.getElementById('tab-quiz'));})()">Retry quiz</button>
          <button class="qbtn" onclick="switchTab('details')">Back to details</button>
        </div>
        <div style="margin-top:14px;width:100%">
          <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Your answers</div>
          ${qs.map((q,i)=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;display:flex;gap:8px;align-items:baseline">
            <span style="color:${state.answered[i]===q.ans?'#7dd87f':'#e88888'};font-size:14px">${state.answered[i]===q.ans?'✓':'✗'}</span>
            <div><div style="color:var(--text);margin-bottom:2px">${q.q}</div><div style="color:var(--text2);font-size:10px">Correct: ${q.opts[q.ans]}</div></div>
          </div>`).join('')}
        </div>
      </div>
    `;
    return;
  }

  const qi=state.qIdx<state.total?state.qIdx:(state.total-1);
  const q=qs[qi];
  const already=state.answered[qi];
  const letters=['A','B','C','D'];

  /* progress dots */
  const dotsHTML=qs.map((_,i)=>{
    const a=state.answered[i];
    let cls='qs-dot';
    if(a!==null) cls+=a===qs[i].ans?' done-ok':' done-fail';
    if(i===qi) return `<div class="${cls}" style="width:10px;height:10px;border:1.5px solid ${g.br}"></div>`;
    return `<div class="${cls}"></div>`;
  }).join('');

  container.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-score-bar">
        <span class="qs-label">Question ${qi+1} of ${state.total}</span>
        <div class="qs-prog">${dotsHTML}</div>
        <span class="qs-score" style="color:${g.tx}">${state.score} / ${state.total}</span>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${qi+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-options" id="q-opts"></div>
        <div class="q-feedback" id="q-fb"></div>
      </div>
      <div class="q-nav">
        <button class="qbtn" id="qprev" ${qi===0?'disabled':''}>← Previous</button>
        <button class="qbtn" id="qskip" ${already!==null?'style="display:none"':''}>Skip</button>
        <button class="qbtn primary" id="qnext" ${already===null?'disabled':''}>
          ${qi===state.total-1?'See results':'Next →'}
        </button>
      </div>
    </div>
  `;

  /* Render options */
  const optsDiv=document.getElementById('q-opts');
  q.opts.forEach((opt,oi)=>{
    const btn=document.createElement('button'); btn.className='q-opt';
    btn.innerHTML=`<span class="q-opt-letter">${letters[oi]}</span>${opt}`;
    if(already!==null){
      btn.disabled=true;
      if(oi===q.ans) btn.classList.add(already===q.ans&&oi===already?'correct':'reveal');
      else if(oi===already&&already!==q.ans) btn.classList.add('wrong');
    } else {
      btn.onclick=()=>{
        const correct=oi===q.ans;
        if(correct) state.score++;
        state.answered[qi]=oi;
        const fb=document.getElementById('q-fb');
        fb.innerHTML=`<b>${correct?'Correct!':'Incorrect.'}</b> ${q.exp}`;
        fb.className=`q-feedback show ${correct?'ok':'fail'}`;
        document.querySelectorAll('.q-opt').forEach((b,bi)=>{
          b.disabled=true;
          if(bi===q.ans) b.classList.add(oi===q.ans?'correct':'reveal');
          else if(bi===oi&&!correct) b.classList.add('wrong');
        });
        document.getElementById('qnext').disabled=false;
        document.getElementById('qskip').style.display='none';
      };
    }
    optsDiv.appendChild(btn);
  });

  /* Show feedback if already answered */
  if(already!==null){
    const fb=document.getElementById('q-fb');
    fb.innerHTML=`<b>${already===q.ans?'Correct!':'Incorrect.'}</b> ${q.exp}`;
    fb.className=`q-feedback show ${already===q.ans?'ok':'fail'}`;
  }

  /* Nav buttons */
  document.getElementById('qprev').onclick=()=>{state.qIdx=Math.max(0,qi-1);renderQuiz(z,g,qs,state,container);};
  document.getElementById('qskip').onclick=()=>{state.answered[qi]=-1;state.qIdx=qi+1;renderQuiz(z,g,qs,state,container);};
  document.getElementById('qnext').onclick=()=>{state.qIdx=qi+1;renderQuiz(z,g,qs,state,container);};
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  hlZ=null; applyF();
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ═══ HOVER TOOLTIP ═══ */
function showTip(e){
  const z=+this.getAttribute('data-z');
  const el=ELS.find(x=>x[0]===z); if(!el)return;
  const g=GRP[el[4]];
  const period=el[5]<=7?el[5]:(el[5]===9?'6 (Ln)':'7 (An)');
  document.getElementById('tip').innerHTML=`
    <div class="t-sym" style="color:${g.tx}">${el[1]}</div>
    <div class="t-name">${el[2]}</div>
    <span class="t-badge" style="background:${g.bg};color:${g.tx}">${g.label}</span>
    <div class="t-row">Atomic number: <b>${el[0]}</b></div>
    <div class="t-row">Atomic mass: <b>${el[3]}</b></div>
    <div class="t-row">State (STP): <b>${stOf(el[1])}</b></div>
    <div class="t-row">Period: <b>${period}</b> · Group: <b>${el[6]}</b></div>
    <div class="t-div"></div>
    <div class="t-hint">Click to open details &amp; quiz</div>`;
  document.getElementById('tip').style.display='block';
  moveTip(e);
}
function moveTip(e){
  const t=document.getElementById('tip');
  let x=e.clientX+16,y=e.clientY+16;
  if(x+230>window.innerWidth)x=e.clientX-238;
  if(y+220>window.innerHeight)y=e.clientY-228;
  t.style.left=x+'px';t.style.top=y+'px';
}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').style.display==='block')moveTip(e);});
function hideTip(){document.getElementById('tip').style.display='none';}

   GROUP MODAL ENGINE

let gQuizStates={};

function openGroupModal(key, startTab){
  const g=GRP[key]; const gx=GRPX[key]; if(!g||!gx)return;
  const els=ELS.filter(e=>e[4]===key).sort((a,b)=>a[0]-b[0]);
  const cnt=els.length;

  /* Header */
  document.getElementById('gm-head').innerHTML=`
    <div class="gm-icon" style="background:${g.bg};border-color:${g.br};color:${g.tx}">${gx.icon}</div>
    <div class="gm-info">
      <div class="gm-title" style="color:${g.tx}">${g.label}</div>
      <div class="gm-sub">${cnt} elements · ${gx.block.toUpperCase()}-block · Periods ${gx.periods}</div>
      <div class="gm-badges">
        <span class="gm-badge" style="background:${g.bg};color:${g.tx};border-color:${g.br}">Valence e⁻: ${gx.valence_e}</span>
        <span class="gm-badge" style="background:${g.bg};color:${g.tx};border-color:${g.br}">Charge: ${gx.charge}</span>
        <span class="gm-badge" style="background:rgba(255,255,255,0.06);color:var(--text2);border-color:var(--border)">${g.bond}</span>
      </div>
    </div>
    <button class="gm-close" id="gm-close-btn">✕</button>
  `;
  document.getElementById('gm-close-btn').onclick=closeGroupModal;

  /* Tabs */
  const GTABS=[
    {id:'goverview',label:'Overview'},
    {id:'gelements',label:'Elements'},
    {id:'gtrends',label:'Trends & Properties'},
    {id:'gfacts',label:'Key Facts'},
    {id:'gquiz',label:'Group Quiz ✦'},
  ];
  const gtabsEl=document.getElementById('gm-tabs'); gtabsEl.innerHTML='';
  GTABS.forEach(t=>{
    const b=document.createElement('button'); b.className='gmtab'; b.setAttribute('data-gtab',t.id);
    b.textContent=t.label; b.onclick=()=>switchGTab(t.id); gtabsEl.appendChild(b);
  });

  const gPanels=document.getElementById('gm-panels'); gPanels.innerHTML='';

  /* ── OVERVIEW panel ── */
  const ovp=document.createElement('div'); ovp.className='gtpanel'; ovp.id='tab-goverview';
  ovp.innerHTML=`
    <div class="msec">
      <div class="msec-title">Group summary</div>
      <div class="mstats">
        <div class="mstat"><div class="mk">Element count</div><div class="mv">${cnt}</div></div>
        <div class="mstat"><div class="mk">Block</div><div class="mv">${gx.block.toUpperCase()}-block</div></div>
        <div class="mstat"><div class="mk">Periods</div><div class="mv">${gx.periods}</div></div>
        <div class="mstat"><div class="mk">Valence electrons</div><div class="mv">${gx.valence_e}</div></div>
        <div class="mstat"><div class="mk">Typical charge</div><div class="mv">${gx.charge}</div></div>
        <div class="mstat"><div class="mk">Bonding type</div><div class="mv" style="font-size:11px">${g.bond}</div></div>
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Group description</div>
      <div class="m-fact" style="border-color:${g.br};font-size:12px;line-height:1.8">${g.desc}</div>
    </div>
    <div class="msec">
      <div class="msec-title">Physical characteristics</div>
      <div class="mprops">
        <div class="mprop"><span class="pk">Melting points</span><span class="pv">${gx.melting}</span></div>
        <div class="mprop"><span class="pk">Density range</span><span class="pv">${gx.density}</span></div>
        <div class="mprop"><span class="pk">Electronegativity</span><span class="pv">${gx.electronegativity}</span></div>
        <div class="mprop"><span class="pk">Hardness</span><span class="pv">${gx.hardness}</span></div>
      </div>
    </div>
    ${Object.keys(gx.color_flame||{}).length?`
    <div class="msec">
      <div class="msec-title">Flame test colours</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${Object.entries(gx.color_flame).map(([sym,col])=>
          `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:11px">
            <span style="font-size:13px;font-weight:500;color:${g.tx};margin-right:6px">${sym}</span>
            <span style="color:var(--text2)">${col||'—'}</span>
          </div>`
        ).join('')}
      </div>
    </div>`:''}
  `;
  gPanels.appendChild(ovp);

  /* ── ELEMENTS panel ── */
  const elp=document.createElement('div'); elp.className='gtpanel'; elp.id='tab-gelements';
  const gelCards=els.map(el=>`
    <div class="gel-card" style="background:${g.bg};border-color:${g.br};color:${g.tx}" title="${el[2]}" onclick="closeGroupModal();openModal(${el[0]},'details')">
      <div class="gel-z">${el[0]}</div>
      <div class="gel-sym">${el[1]}</div>
      <div class="gel-name">${el[2]}</div>
    </div>
  `).join('');
  elp.innerHTML=`
    <div class="msec">
      <div class="msec-title">All ${cnt} elements in this group</div>
      <div class="gel-grid">${gelCards}</div>
    </div>
    <div class="msec">
      <div class="msec-title">Data comparison</div>
      <div style="overflow-x:auto">
        <table class="cmp-tbl">
          <thead><tr>
            <th>Element</th><th>Z</th><th>Crystal</th><th>Mp (K)</th><th>Bp (K)</th><th>Density</th><th>Ox. states</th><th>χ (EN)</th>
          </tr></thead>
          <tbody>
            ${(gx.comparisons||[]).map(r=>`<tr>
              <td><span class="cmp-sym" style="color:${g.tx}">${r[1]}</span>${r[2]}</td>
              <td>${r[0]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td>
              <td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  gPanels.appendChild(elp);

  /* ── TRENDS panel ── */
  const trp=document.createElement('div'); trp.className='gtpanel'; trp.id='tab-gtrends';
  function tBar(lbl,pct,note){
    return `<div class="trend-row">
      <span class="trend-lbl">${lbl}</span>
      <div class="trend-bar"><div class="trend-fill" style="width:${pct}%;background:${g.br}"></div></div>
      <span class="trend-val">${note}</span>
    </div>`;
  }
  trp.innerHTML=`
    <div class="msec">
      <div class="msec-title">Relative property levels (within all groups)</div>
      <div class="trend-wrap">
        ${tBar('Reactivity',gx.trend_reactivity,gx.trend_reactivity>=75?'Very high':gx.trend_reactivity>=50?'High':gx.trend_reactivity>=25?'Moderate':'Low')}
        ${tBar('Melting point',gx.trend_melting,gx.trend_melting>=75?'Very high':gx.trend_melting>=50?'High':gx.trend_melting>=25?'Moderate':'Low')}
        ${tBar('Density',gx.trend_density,gx.trend_density>=75?'Very high':gx.trend_density>=50?'High':gx.trend_density>=25?'Moderate':'Low')}
        ${tBar('Electronegativity',gx.trend_en,gx.trend_en>=75?'Very high':gx.trend_en>=50?'High':gx.trend_en>=25?'Moderate':'Low/none')}
      </div>
    </div>
    <div class="msec">
      <div class="msec-title">Properties in detail</div>
      <div class="mprops">
        <div class="mprop"><span class="pk">Typical melting points</span><span class="pv">${gx.melting}</span></div>
        <div class="mprop"><span class="pk">Density range</span><span class="pv">${gx.density}</span></div>
        <div class="mprop"><span class="pk">Electronegativity range</span><span class="pv">${gx.electronegativity}</span></div>
        <div class="mprop"><span class="pk">Hardness</span><span class="pv">${gx.hardness}</span></div>
        <div class="mprop"><span class="pk">Valence electrons</span><span class="pv">${gx.valence_e}</span></div>
        <div class="mprop"><span class="pk">Common charge</span><span class="pv">${gx.charge}</span></div>
        <div class="mprop"><span class="pk">Block</span><span class="pv">${gx.block.toUpperCase()}-block</span></div>
        <div class="mprop"><span class="pk">Bonding type</span><span class="pv">${g.bond}</span></div>
      </div>
    </div>
  `;
  gPanels.appendChild(trp);

  /* ── KEY FACTS panel ── */
  const kfp=document.createElement('div'); kfp.className='gtpanel'; kfp.id='tab-gfacts';
  const factsHTML=(gx.facts||[]).map(f=>`
    <div class="kf-item">
      <div class="kf-bullet" style="background:${g.br}"></div>
      <div class="kf-text">${f}</div>
    </div>
  `).join('');
  kfp.innerHTML=`
    <div class="msec">
      <div class="msec-title">Key facts about ${g.label}</div>
      <div class="kf-list">${factsHTML}</div>
    </div>
    <div class="msec">
      <div class="msec-title">Group at a glance</div>
      <div class="m-fact" style="border-color:${g.br}">${g.desc}</div>
    </div>
  `;
  gPanels.appendChild(kfp);

  /* ── GROUP QUIZ panel ── */
  const gqp=document.createElement('div'); gqp.className='gtpanel'; gqp.id='tab-gquiz';
  gPanels.appendChild(gqp);
  if(!gQuizStates[key]) gQuizStates[key]={qIdx:0,score:0,answered:new Array((gx.quiz||[]).length).fill(null),total:(gx.quiz||[]).length};
  renderGQuiz(key,g,gx.quiz||[],gQuizStates[key],gqp);

  document.getElementById('g-overlay').classList.add('open');
  gPanels.scrollTop=0;
  switchGTab(startTab||'goverview');
}

function switchGTab(id){
  document.querySelectorAll('.gmtab').forEach(t=>t.classList.toggle('active',t.getAttribute('data-gtab')===id));
  document.querySelectorAll('.gtpanel').forEach(p=>p.classList.toggle('active',p.id===`tab-${id}`));
}

function closeGroupModal(){
  document.getElementById('g-overlay').classList.remove('open');
}

document.getElementById('g-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('g-overlay')) closeGroupModal();
});

/* ── Group quiz renderer ── */
function renderGQuiz(key,g,qs,state,container){
  container.innerHTML='';
  if(!qs.length){
    container.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text2);font-size:12px">No quiz questions for this group yet.</div>`;
    return;
  }

  if(state.qIdx>=state.total && state.answered.every(a=>a!==null)){
    const pct=Math.round((state.score/state.total)*100);
    const grade=pct>=80?{label:'Excellent!',bg:'rgba(76,175,80,0.15)',col:'#7dd87f'}:pct>=60?{label:'Good work',bg:'rgba(255,193,7,0.12)',col:'#ffd54f'}:{label:'Keep studying!',bg:'rgba(226,85,85,0.12)',col:'#e88888'};
    container.innerHTML=`
      <div class="quiz-result show">
        <div class="result-score" style="color:${g.tx}">${state.score}<span style="font-size:24px;color:var(--text2)">/${state.total}</span></div>
        <div class="result-label">Quiz complete · <b>${g.label}</b></div>
        <div class="result-grade" style="background:${grade.bg};color:${grade.col}">${grade.label} — ${pct}%</div>
        <div class="result-breakdown">
          <div class="rb-item"><b style="color:#7dd87f">${state.score}</b> correct</div>
          <div class="rb-item"><b style="color:#e88888">${state.total-state.score}</b> wrong</div>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button class="qbtn primary" onclick="gQuizStates['${key}']={qIdx:0,score:0,answered:new Array(${qs.length}).fill(null),total:${qs.length}};renderGQuiz('${key}',GRP['${key}'],GRPX['${key}'].quiz,gQuizStates['${key}'],document.getElementById('tab-gquiz'))">Retry quiz</button>
          <button class="qbtn" onclick="switchGTab('goverview')">Back to overview</button>
        </div>
        <div style="margin-top:16px;width:100%">
          <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Review answers</div>
          ${qs.map((q,i)=>`<div style="padding:9px 0;border-bottom:1px solid var(--border);font-size:11px;display:flex;gap:8px;align-items:flex-start">
            <span style="color:${state.answered[i]===q.ans?'#7dd87f':'#e88888'};font-size:16px;line-height:1">${state.answered[i]===q.ans?'✓':'✗'}</span>
            <div><div style="color:var(--text);margin-bottom:3px;line-height:1.5">${q.q}</div><div style="color:var(--text2);font-size:10px">Correct answer: <b>${q.opts[q.ans]}</b></div><div style="color:var(--text3);font-size:10px;margin-top:2px;line-height:1.5">${q.exp}</div></div>
          </div>`).join('')}
        </div>
      </div>`;
    return;
  }

  const qi=Math.min(state.qIdx,state.total-1);
  const q=qs[qi];
  const already=state.answered[qi];
  const letters=['A','B','C','D'];

  const dotsHTML=qs.map((_,i)=>{
    const a=state.answered[i];
    let cls='qs-dot';
    if(a!==null) cls+=a===qs[i].ans?' done-ok':' done-fail';
    if(i===qi) return `<div class="${cls}" style="width:10px;height:10px;border:1.5px solid ${g.br}"></div>`;
    return `<div class="${cls}"></div>`;
  }).join('');

  container.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-score-bar">
        <span class="qs-label">${g.label} · Q${qi+1}/${state.total}</span>
        <div class="qs-prog">${dotsHTML}</div>
        <span class="qs-score" style="color:${g.tx}">${state.score}/${state.total}</span>
      </div>
      <div class="q-card">
        <div class="q-num">Question ${qi+1} of ${state.total} — ${g.label}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-options" id="gq-opts"></div>
        <div class="q-feedback" id="gq-fb"></div>
      </div>
      <div class="q-nav">
        <button class="qbtn" id="gqprev" ${qi===0?'disabled':''}>← Prev</button>
        <button class="qbtn" id="gqskip" ${already!==null?'style="display:none"':''}>Skip</button>
        <button class="qbtn primary" id="gqnext" ${already===null?'disabled':''}>${qi===state.total-1?'See results':'Next →'}</button>
      </div>
    </div>`;

  const optsDiv=document.getElementById('gq-opts');
  q.opts.forEach((opt,oi)=>{
    const btn=document.createElement('button'); btn.className='q-opt';
    btn.innerHTML=`<span class="q-opt-letter">${letters[oi]}</span>${opt}`;
    if(already!==null){
      btn.disabled=true;
      if(oi===q.ans) btn.classList.add(already===q.ans&&oi===already?'correct':'reveal');
      else if(oi===already&&already!==q.ans) btn.classList.add('wrong');
    } else {
      btn.onclick=()=>{
        const correct=oi===q.ans;
        if(correct) state.score++;
        state.answered[qi]=oi;
        const fb=document.getElementById('gq-fb');
        fb.innerHTML=`<b>${correct?'Correct!':'Incorrect.'}</b> ${q.exp}`;
        fb.className=`q-feedback show ${correct?'ok':'fail'}`;
        document.querySelectorAll('#gq-opts .q-opt').forEach((b,bi)=>{
          b.disabled=true;
          if(bi===q.ans) b.classList.add(oi===q.ans?'correct':'reveal');
          else if(bi===oi&&!correct) b.classList.add('wrong');
        });
        document.getElementById('gqnext').disabled=false;
        document.getElementById('gqskip').style.display='none';
      };
    }
    optsDiv.appendChild(btn);
  });

  if(already!==null){
    const fb=document.getElementById('gq-fb');
    fb.innerHTML=`<b>${already===q.ans?'Correct!':'Incorrect.'}</b> ${q.exp}`;
    fb.className=`q-feedback show ${already===q.ans?'ok':'fail'}`;
  }

  document.getElementById('gqprev').onclick=()=>{state.qIdx=Math.max(0,qi-1);renderGQuiz(key,g,qs,state,container);};
  document.getElementById('gqskip').onclick=()=>{state.answered[qi]=-1;state.qIdx=qi+1;renderGQuiz(key,g,qs,state,container);};
  document.getElementById('gqnext').onclick=()=>{state.qIdx=qi+1;renderGQuiz(key,g,qs,state,container);};
}

buildGrid();
</script>
</body>
</html>
